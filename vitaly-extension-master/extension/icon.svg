<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6fbf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4f9d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#grad)"/>
  
  <!-- Circle background for icon -->
  <circle cx="64" cy="64" r="44" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Dollar bag icon -->
  <g transform="translate(64, 64)" filter="url(#shadow)">
    <!-- Bag body -->
    <path d="M-20,-10 Q-25,10 -15,25 Q0,32 15,25 Q25,10 20,-10 Z" fill="url(#iconGrad)"/>
    <!-- Bag top -->
    <ellipse cx="0" cy="-10" rx="20" ry="8" fill="#f59e0b"/>
    <!-- Dollar sign -->
    <text x="0" y="12" font-size="28" font-weight="bold" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif">$</text>
  </g>
</svg>
